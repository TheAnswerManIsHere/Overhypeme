openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Overhype.me
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: facts
    description: Overhype.me facts operations
  - name: hashtags
    description: Hashtag operations
  - name: ratings
    description: Fact rating operations
  - name: comments
    description: Comment operations
  - name: links
    description: External link operations
  - name: users
    description: User profile operations
  - name: memes
    description: Meme generator and permalink operations
  - name: affiliate
    description: Affiliate click-through tracking and admin stats
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success.

  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.

  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /facts:
    get:
      operationId: listFacts
      tags: [facts]
      summary: List facts
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: hashtag
          in: query
          required: false
          schema:
            type: string
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [top, newest, trending]
            default: top
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: List of facts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FactListResponse"
    post:
      operationId: createFact
      tags: [facts]
      summary: Submit a new fact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFactRequest"
      responses:
        "201":
          description: Fact created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FactDetail"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Possible duplicate detected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicateConflict"

  /facts/{factId}:
    get:
      operationId: getFact
      tags: [facts]
      summary: Get a single fact with details
      parameters:
        - name: factId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Fact detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FactDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /facts/{factId}/rating:
    post:
      operationId: rateFact
      tags: [ratings]
      summary: Rate a fact (upvote or downvote)
      parameters:
        - name: factId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RateFactRequest"
      responses:
        "200":
          description: Rating updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RatingResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /facts/{factId}/comments:
    get:
      operationId: listComments
      tags: [comments]
      summary: List comments for a fact
      parameters:
        - name: factId
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentListResponse"
    post:
      operationId: addComment
      tags: [comments]
      summary: Add a comment to a fact
      parameters:
        - name: factId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCommentRequest"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /facts/{factId}/links:
    get:
      operationId: listLinks
      tags: [links]
      summary: List external links for a fact
      parameters:
        - name: factId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of external links
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkListResponse"

  /facts/{factId}/links/{linkId}:
    delete:
      operationId: deleteLink
      tags: [links]
      summary: Delete an external link
      parameters:
        - name: factId
          in: path
          required: true
          schema:
            type: integer
        - name: linkId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Link deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /hashtags:
    get:
      operationId: listHashtags
      tags: [hashtags]
      summary: List all hashtags with fact counts
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of hashtags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HashtagListResponse"

  /users/me:
    get:
      operationId: getMyProfile
      tags: [users]
      summary: Get the current user's profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      operationId: updateMyProfile
      tags: [users]
      summary: Update the current user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProfileResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Conflict (username or email already taken)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /users/me/search-history:
    post:
      operationId: recordSearch
      tags: [users]
      summary: Record a search query to history
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordSearchRequest"
      responses:
        "204":
          description: Search recorded

  /ai/check-duplicate:
    post:
      operationId: checkDuplicate
      tags: [facts]
      summary: Check if a fact text is a duplicate (requires auth)
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  minLength: 10
                  maxLength: 1000
      responses:
        "200":
          description: Duplicate check result
          content:
            application/json:
              schema:
                type: object
                required: [isDuplicate, confidence]
                properties:
                  isDuplicate:
                    type: boolean
                  confidence:
                    type: integer
                    minimum: 0
                    maximum: 100
                  matchingFactId:
                    type: integer
                    nullable: true
                  matchingFactText:
                    type: string
                    nullable: true
        "401":
          description: Authentication required
        "429":
          description: Rate limit exceeded

  /ai/suggest-hashtags:
    post:
      operationId: suggestHashtags
      tags: [hashtags]
      summary: Suggest hashtags for a fact text (requires auth)
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  minLength: 5
                  maxLength: 1000
      responses:
        "200":
          description: Suggested hashtags
          content:
            application/json:
              schema:
                type: object
                required: [hashtags]
                properties:
                  hashtags:
                    type: array
                    items:
                      type: string
        "401":
          description: Authentication required
        "429":
          description: Rate limit exceeded

  /admin/comments/flagged:
    get:
      operationId: getAdminFlaggedComments
      tags: [comments]
      summary: List AI-flagged comments (admin only)
      security:
        - SessionCookie: []
      responses:
        "200":
          description: Flagged comments list
          content:
            application/json:
              schema:
                type: object
                required: [comments]
                properties:
                  comments:
                    type: array
                    items:
                      type: object
                      required: [id, factId, text, createdAt]
                      properties:
                        id:
                          type: integer
                        factId:
                          type: integer
                        text:
                          type: string
                        authorId:
                          type: string
                          nullable: true
                        flagReason:
                          type: string
                          nullable: true
                        createdAt:
                          type: string
                          format: date-time
        "401":
          description: Authentication required
        "403":
          description: Forbidden

  /admin/comments/{id}/approve:
    post:
      operationId: approveAdminComment
      tags: [comments]
      summary: Approve (unflag) a flagged comment (admin only)
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comment approved
        "401":
          description: Authentication required
        "403":
          description: Forbidden

  /admin/comments/{id}:
    delete:
      operationId: deleteAdminComment
      tags: [comments]
      summary: Delete a flagged comment (admin only)
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comment deleted
        "401":
          description: Authentication required
        "403":
          description: Forbidden

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /memes/templates:
    get:
      operationId: listMemeTemplates
      tags: [memes]
      summary: List available meme background templates
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemeTemplateListResponse"

  /memes:
    post:
      operationId: createMeme
      tags: [memes]
      summary: Create a meme from a fact and template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemeRequest"
      responses:
        "201":
          description: Meme created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemeRecord"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /memes/{slug}:
    get:
      operationId: getMemeBySlug
      tags: [memes]
      summary: Get a meme by its permalink slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Meme detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemeDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /facts/{factId}/memes:
    get:
      operationId: listFactMemes
      tags: [memes]
      summary: List memes generated for a specific fact
      parameters:
        - name: factId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of memes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemeListResponse"

  /affiliate/click:
    post:
      operationId: logAffiliateClick
      tags: [affiliate]
      summary: Log an affiliate click and get the destination URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AffiliateClickRequest"
      responses:
        "200":
          description: Affiliate redirect URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AffiliateClickResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /affiliate/stats:
    get:
      operationId: getAffiliateStats
      tags: [affiliate]
      summary: Get affiliate click stats (admin only)
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
          description: "Filter clicks from this date, inclusive (YYYY-MM-DD)"
        - name: to
          in: query
          required: false
          schema:
            type: string
          description: "Filter clicks up to this date, inclusive (YYYY-MM-DD)"
      responses:
        "200":
          description: Affiliate click stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AffiliateStatsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden — admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /admin/import/facts:
    post:
      operationId: bulkImportFacts
      tags: [facts]
      summary: Bulk-import facts (API key required)
      description: |
        Accepts a JSON array of fact objects (or `{ "facts": [...] }`) and inserts
        them in bulk. Protected by the `X-API-Key` header (ADMIN_API_KEY secret).
        Supports `?dryRun=true` to validate without writing.
      security:
        - ApiKey: []
      parameters:
        - name: dryRun
          in: query
          required: false
          schema:
            type: boolean
          description: If true, validate items but do not write to the database.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: array
                  items:
                    $ref: "#/components/schemas/ImportFactItem"
                  maxItems: 500
                - type: object
                  required: [facts]
                  properties:
                    facts:
                      type: array
                      items:
                        $ref: "#/components/schemas/ImportFactItem"
                      maxItems: 500
      responses:
        "201":
          description: Import complete (some items may have failed validation)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportFactsResponse"
        "400":
          description: Malformed request body or empty array
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid API key / session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden — admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

components:
  securitySchemes:
    ApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: Static API key set via the ADMIN_API_KEY environment variable. Used by automated callers (e.g. LLM agents) that cannot use a browser session.
    SessionCookie:
      type: apiKey
      in: cookie
      name: sid
      description: Browser session cookie (set by the login flow).

  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Bearer session token (used by mobile clients).
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Session cookie (used by browser clients).
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AuthUser:
      type: object
      required: [id]
      properties:
        id:
          type: string
        email:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        profileImageUrl:
          type: string
          nullable: true
        membershipTier:
          type: string
          enum: [free, premium]
          nullable: true
        isAdmin:
          type: boolean
          nullable: true
        isRealAdmin:
          type: boolean
          nullable: true
        pronouns:
          type: string
          nullable: true

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'

    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1

    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string

    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    DuplicateConflict:
      type: object
      required: [error, isDuplicate, confidence]
      properties:
        error:
          type: string
        isDuplicate:
          type: boolean
        confidence:
          type: integer
        matchingFactId:
          type: integer
        matchingFactText:
          type: string

    AffiliateClickRequest:
      type: object
      required: [sourceType, sourceId, destination, text]
      properties:
        sourceType:
          type: string
          enum: [fact, meme]
        sourceId:
          type: string
        destination:
          type: string
          enum: [zazzle]
        text:
          type: string
        imageUrl:
          type: string
          nullable: true

    AffiliateClickResponse:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri

    AffiliateClickRow:
      type: object
      required: [sourceType, sourceId, destination, clicks, lastClicked]
      properties:
        sourceType:
          type: string
          enum: [fact, meme]
        sourceId:
          type: string
        destination:
          type: string
          enum: [zazzle]
        clicks:
          type: integer
        lastClicked:
          type: string
          format: date-time

    AffiliateDestinationTotal:
      type: object
      required: [destination, total]
      properties:
        destination:
          type: string
          enum: [zazzle]
        total:
          type: integer

    AffiliateStatsResponse:
      type: object
      required: [rows, totals]
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/AffiliateClickRow"
        totals:
          type: array
          items:
            $ref: "#/components/schemas/AffiliateDestinationTotal"

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Hashtag:
      type: object
      required: [id, name, factCount]
      properties:
        id:
          type: integer
        name:
          type: string
        factCount:
          type: integer

    HashtagListResponse:
      type: object
      required: [hashtags]
      properties:
        hashtags:
          type: array
          items:
            $ref: "#/components/schemas/Hashtag"

    FactSummary:
      type: object
      required: [id, text, upvotes, downvotes, commentCount, hashtags, createdAt]
      properties:
        id:
          type: integer
        text:
          type: string
        upvotes:
          type: integer
        downvotes:
          type: integer
        score:
          type: integer
        commentCount:
          type: integer
        hashtags:
          type: array
          items:
            type: string
        submittedBy:
          type: string
          nullable: true
        submittedByImage:
          type: string
          nullable: true
        userRating:
          type: string
          enum: [up, down]
          nullable: true
        createdAt:
          type: string
          format: date-time

    FactDetail:
      allOf:
        - $ref: "#/components/schemas/FactSummary"
        - type: object
          properties:
            links:
              type: array
              items:
                $ref: "#/components/schemas/ExternalLink"

    FactListResponse:
      type: object
      required: [facts, total]
      properties:
        facts:
          type: array
          items:
            $ref: "#/components/schemas/FactSummary"
        total:
          type: integer

    CreateFactRequest:
      type: object
      required: [text, captchaToken]
      properties:
        text:
          type: string
          minLength: 10
          maxLength: 1000
        hashtags:
          type: array
          items:
            type: string
          default: []
        captchaToken:
          type: string
        skipDuplicateCheck:
          type: boolean
          description: If true, bypasses server-side duplicate enforcement and allows submission even when a duplicate is detected.

    RateFactRequest:
      type: object
      required: [rating]
      properties:
        rating:
          type: string
          enum: [up, down, none]

    RatingResult:
      type: object
      required: [upvotes, downvotes, userRating]
      properties:
        upvotes:
          type: integer
        downvotes:
          type: integer
        userRating:
          type: string
          enum: [up, down]
          nullable: true

    Comment:
      type: object
      required: [id, factId, text, createdAt]
      properties:
        id:
          type: integer
        factId:
          type: integer
        text:
          type: string
        authorId:
          type: string
          nullable: true
        authorName:
          type: string
          nullable: true
        authorImage:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    CommentListResponse:
      type: object
      required: [comments, total]
      properties:
        comments:
          type: array
          items:
            $ref: "#/components/schemas/Comment"
        total:
          type: integer

    AddCommentRequest:
      type: object
      required: [text, captchaToken]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 2000
        captchaToken:
          type: string

    ExternalLink:
      type: object
      required: [id, factId, url, createdAt]
      properties:
        id:
          type: integer
        factId:
          type: integer
        url:
          type: string
        title:
          type: string
          nullable: true
        platform:
          type: string
          nullable: true
        addedBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    LinkListResponse:
      type: object
      required: [links]
      properties:
        links:
          type: array
          items:
            $ref: "#/components/schemas/ExternalLink"

    UserProfile:
      type: object
      required: [id, submittedFacts, likedFacts, favoriteHashtags, searchHistory]
      properties:
        id:
          type: string
        email:
          type: string
          nullable: true
        pendingEmail:
          type: string
          nullable: true
        emailVerified:
          type: boolean
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        username:
          type: string
          nullable: true
        pronouns:
          type: string
          nullable: true
        profileImageUrl:
          type: string
          nullable: true
        submittedFacts:
          type: array
          items:
            $ref: "#/components/schemas/FactSummary"
        likedFacts:
          type: array
          items:
            $ref: "#/components/schemas/FactSummary"
        favoriteHashtags:
          type: array
          items:
            type: string
        searchHistory:
          type: array
          items:
            type: string

    UpdateProfileRequest:
      type: object
      properties:
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
        username:
          type: string
          minLength: 3
          maxLength: 30
          pattern: "^[a-zA-Z0-9_]+$"
        pronouns:
          type: string
          minLength: 1
          maxLength: 20
        email:
          type: string
          format: email

    UpdateProfileResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        emailVerificationPending:
          type: boolean

    RecordSearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          minLength: 1

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'

    MemeTemplate:
      type: object
      required: [id, name, description]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        previewColors:
          type: array
          items:
            type: string
        previewImageUrl:
          type: string

    MemeTemplateListResponse:
      type: object
      required: [templates]
      properties:
        templates:
          type: array
          items:
            $ref: "#/components/schemas/MemeTemplate"

    MemeTextOptions:
      type: object
      properties:
        fontSize:
          type: integer
          minimum: 14
          maximum: 48
        color:
          type: string
        align:
          type: string
          enum: [left, center, right]
        verticalPosition:
          type: string
          enum: [top, middle, bottom]

    CreateMemeRequest:
      type: object
      required: [factId, templateId]
      properties:
        factId:
          type: integer
        templateId:
          type: string
        textOptions:
          $ref: "#/components/schemas/MemeTextOptions"

    MemeRecord:
      type: object
      required: [id, factId, templateId, imageUrl, permalinkSlug, createdAt]
      properties:
        id:
          type: integer
        factId:
          type: integer
        templateId:
          type: string
        imageUrl:
          type: string
        permalinkSlug:
          type: string
        createdAt:
          type: string
          format: date-time

    MemeDetail:
      type: object
      required: [id, factId, templateId, imageUrl, permalinkSlug, factText, createdAt]
      properties:
        id:
          type: integer
        factId:
          type: integer
        templateId:
          type: string
        imageUrl:
          type: string
        permalinkSlug:
          type: string
        factText:
          type: string
        createdAt:
          type: string
          format: date-time
        createdByName:
          type: string
          nullable: true

    MemeListResponse:
      type: object
      required: [memes]
      properties:
        memes:
          type: array
          items:
            $ref: "#/components/schemas/MemeRecord"

    ImportFactItem:
      type: object
      required: [text]
      description: A single fact to import. The `text` field is required; `hashtags` is optional.
      properties:
        text:
          type: string
          minLength: 10
          maxLength: 1000
          description: The fact text. Must be at least 10 characters.
        hashtags:
          type: array
          items:
            type: string
            maxLength: 100
            pattern: "^[a-zA-Z0-9_]+$"
          maxItems: 20
          default: []
          description: Optional list of hashtag slugs to attach to this fact.

    BulkImportFactsValidationError:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
          description: The field that failed validation (e.g. "text", "hashtags.0").
        message:
          type: string
          description: Human-readable reason the field failed validation.

    BulkImportFactsFailedItem:
      type: object
      required: [index, errors]
      properties:
        index:
          type: integer
          description: Zero-based position of the item in the submitted array.
        errors:
          type: array
          items:
            $ref: "#/components/schemas/BulkImportFactsValidationError"

    BulkImportFactsResponse:
      type: object
      required: [failed]
      description: |
        Result of a bulk import. When `dryRun` is true, `wouldCreate` is present
        instead of `created`/`skipped`.
      properties:
        dryRun:
          type: boolean
          description: Present and true when the request was a dry run.
        created:
          type: integer
          description: Number of facts successfully inserted (absent in dry-run mode).
        skipped:
          type: integer
          description: Number of valid facts skipped due to exact-text duplicates (absent in dry-run mode).
        wouldCreate:
          type: integer
          description: Number of facts that would be created (dry-run mode only).
        failed:
          type: array
          items:
            $ref: "#/components/schemas/BulkImportFactsFailedItem"
          description: Items that failed schema validation and were not inserted.
