<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>TCNDB — The Custom Name Database</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Google Analytics 4 — loaded only when VITE_GA_MEASUREMENT_ID is set at build time -->
    <script id="ga4-init">
      (function() {
        var gaId = "%VITE_GA_MEASUREMENT_ID%";
        if (!gaId || gaId === "%VITE_GA_MEASUREMENT_ID%" || gaId === "undefined") return;
        var s = document.createElement("script");
        s.async = true;
        s.src = "https://www.googletagmanager.com/gtag/js?id=" + gaId;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){ window.dataLayer.push(arguments); }
        window.gtag = gtag;
        gtag("js", new Date());
        gtag("config", gaId, { send_page_view: false });
      })();
    </script>

    <!-- Google AdSense — loaded only when VITE_ADSENSE_PUBLISHER_ID is set at build time -->
    <script id="adsense-init">
      (function() {
        var pubId = "%VITE_ADSENSE_PUBLISHER_ID%";
        if (!pubId || pubId === "%VITE_ADSENSE_PUBLISHER_ID%" || pubId === "undefined") return;
        var s = document.createElement("script");
        s.async = true;
        s.crossOrigin = "anonymous";
        s.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=" + pubId;
        document.head.appendChild(s);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
